name: Cypress Test and Terraform Apply

on:
  push:
    paths:
      - 'cypress/e2e/**'
      - '**/*.tf'
      - 'python/**'

jobs:
  test:
    runs-on: ubuntu-latest

    container:
      image: cypress/included:7.7.0

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Clear Cypress Cache
      run: npx cypress cache clear

    - name: Install Cypress
      run: npm install cypress@13.6.4

    - name: Run Cypress tests
      run: npx cypress run --spec "cypress/e2e/spec.cy.js"

  terraform:
    runs-on: ubuntu-latest
    needs: test

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_region: ${{ secrets.AWS_REGION }}
      TF_VAR_root_domain_name: "ip-petrov.com"
      TF_VAR_www_domain_name: "www.ip-petrov.com"
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      TF_VAR_SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
      TF_VAR_RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Install Terraform
      uses: hashicorp/setup-terraform@v1

    - name: Configure AWS credentials
      run: |
        mkdir -p ~/.aws
        echo "[default]
        aws_access_key_id=${AWS_ACCESS_KEY_ID}
        aws_secret_access_key=${AWS_SECRET_ACCESS_KEY}
        region=${AWS_REGION}
        " > ~/.aws/credentials

    - name: Terraform Init
      run: terraform init

    - name: Terraform Apply
      run: terraform apply -auto-approve
